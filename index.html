<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;

        }
        body {

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 40px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 28px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.02);

            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            color: #2c3e4f;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        .subtitle {
            font-size: 16px;
            color: #5f6c7a;
            margin-bottom: 28px;
            border-left: 3px solid #b89b8b;
            padding-left: 14px;
            font-weight: 300;
        }

            width: 100%;
            height: 4px;
            background: #ddd2ca;
            border-radius: 4px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #8f6b5c;
            width: 0%;

        }
        .question-container {
            min-height: 320px;
            display: flex;
            flex-direction: column;
        }

            font-weight: 450;
            line-height: 1.4;
            color: #1f2b36;
            margin-bottom: 28px;
            padding-right: 10px;
        }

            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        .option {
            background: white;
            border: 1px solid #e2d7d0;
            border-radius: 60px;
            padding: 16px 20px;
            font-size: 16px;
            color: #2c3e4f;
            transition: all 0.15s;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option:hover {
            background: #faf5f2;
            border-color: #b89b8b;
            transform: scale(1.01);
        }
        .option.selected {
            background: #e9dbd4;
            border-color: #8f6b5c;
            box-shadow: 0 4px 12px rgba(143,107,92,0.15);
        }
        .option-prefix {
            width: 24px;
            height: 24px;
            border-radius: 24px;
            background: #f0e7e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #5f4b41;
            font-weight: 500;
        }
        .option.selected .option-prefix {
            background: #8f6b5c;
            color: white;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
        }
        .btn {
            padding: 14px 28px;
            border-radius: 60px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            background: white;
            color: #5f4b41;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #dccfc8;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            flex: 0 1 auto;
        }
        .btn-primary {
            background: #5f4b41;
            color: white;
            border: none;
            box-shadow: 0 8px 16px rgba(95,75,65,0.15);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .result-screen {
            text-align: center;
            padding: 20px 0;
        }
        .result-type {
            font-size: 32px;
            font-weight: 500;
            color: #2c3e4f;
            margin-bottom: 12px;
        }
        .result-image {
            font-size: 60px;
            margin: 20px 0;
            opacity: 0.9;
        }
        .result-desc {
            font-size: 18px;
            line-height: 1.6;
            color: #3e4c5b;
            margin-bottom: 24px;
            white-space: pre-line;
            text-align: left;
        }
        .result-quote {
            font-style: italic;
            color: #8f6b5c;
            padding: 20px;
            border-top: 1px dashed #dccfc8;
            border-bottom: 1px dashed #dccfc8;
            margin: 20px 0;
            font-size: 16px;
        }
        .epilogue {
            background: rgba(95,75,65,0.05);
            border-radius: 24px;
            padding: 24px;
            margin: 24px 0;
            font-size: 14px;
            line-height: 1.6;
            color: #5f4b41;
            text-align: left;
        }
        .error-msg {
            color: #b1624b;
            background: #fbe9e3;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
        .admin-link {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 12px;
            color: #b5a092;
            background: rgba(255,255,255,0.6);
            padding: 4px 12px;
            border-radius: 30px;
            text-decoration: none;
        }
    </style>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

        { text: "4. 什么会成为你结束长久关系的“最后一片雪花”？", options: ["A. 信任的裂隙已深至结构层面", "B. 在这段关系中，我逐渐感到窒息", "C. 外在力量让我们必须驶向不同洋流", "D. 我们仍在发光，只是灵魂不再契合"], scores: { X: [1,2,2,3], Y: [2,1,3,3], Z: [2,2,1,3] } },

        { text: "8. 你认为你最无法舍弃的是？", options: ["A. 生命", "B. 自由", "C. 爱", "D. 钱财"], scores: { X: [1,3,2,1], Y: [2,3,3,1], Z: [2,3,2,1] } },
        { text: "9. 如果一段关系将走到终点，你心中想要挽回，你会怎么做？", options: ["A. 直白的表达内心，告诉对方你的不舍", "B. 该结束的就意味着没有缘分，尽管不舍也会任他结束", "C. 默默修复，不再言语", "D. 等待下一次的转机"], scores: { X: [2,2,2,2], Y: [2,3,2,2], Z: [2,3,2,2] } },

        { text: "17. 在你心中，“伟大”最接近哪种形态？", options: ["A. 坚定的理想情怀", "B. 在时间中流传的不朽故事", "C. 看似微小，却蕴含改变世界的力量", "D. 表面平静，内里包容万物"], scores: { X: [3,2,2,2], Y: [2,2,2,2], Z: [3,2,2,2] } },
        { text: "18. 你的内心世界最常呈现哪种气象？", options: ["A. 暴风雪——激烈、混沌，充满能量与危险", "B. 永昼——明亮、温暖，但可能缺乏阴影与深度", "C. 雾霭清晨——朦胧、暧昧，边界模糊不清", "D. 深海静流——表面平静，深处暗涌不息"], scores: { X: [3,1,2,2], Y: [2,2,2,3], Z: [3,2,2,3] } },

    // 结果描述库（完整）
    const results = {
        '古墙的守望者': { desc: `你的稳定不是天生的，是每一次选择不离开的结果。你在关系中深深扎根，像一棵树的根须探入地下暗河，你知道那里有水源。你相信忠诚比激情更持久，责任比自由更沉重，但也因此，你成为许多人生命中“不会倒塌”的部分。\n\n痛苦被你锻造成肌肉记忆——它不会消失，但它教会你如何承受。缺憾被你转化为守护的动力：你守护他人，就像当初渴望被守护一样。你不轻易原谅，但一旦原谅，就是磐石般的承诺。你有时觉得自己过于沉重，但正是这份重量，让靠近你的人有了立足之地。`, quote: `“你是一座有记忆的城，每一块砖都刻着一个不离开的理由。城墙不是为了隔绝，而是为了让城内的人，安心生长。”`, growth: `有时，允许城墙上有藤蔓生长，也是力量的一种。不是所有裂缝都需要修补，有些裂缝，是光照进来的地方。`, works: `余华《活着》｜电影《归来》｜穆旦《赞美》` },
        '榕树的低语': { desc: `你的扎根是一种本能，像树知道往哪里生长。你并不刻意维系什么，却总能让身边的人感到安心——因为你把给予当作呼吸，把陪伴当作四季轮转般自然。你在关系中自然地付出，不觉得是牺牲，因为你相信：滋养他人，并不会枯竭自己。\n\n痛苦被你接纳为年轮的一部分，它没有成为伤痕，而是成为你理解他人的深度。缺憾反而让你更完整——你从不追求没有裂痕的人生，因为你知道，裂痕是光线进入的地方。你原谅，不是因为应该，而是因为放下比背负更轻盈。你像一棵会移动的树，走到哪里，就把根系带到哪里，也把荫凉带到哪里。`, quote: `“你是一棵会走路的树，根在哪里，家就在哪里。你不急着成为森林，因为你相信，时间会让一切自然生长。”`, growth: `你的涌现需要空间，记得为自己保留一片不被侵入的土壤。有时，主动选择扎根的方向，也是生长的一种。`, works: `梭罗《瓦尔登湖》｜电影《小森林》｜海子《活在珍贵的人间》` },
        '灯塔的独白': { desc: `你的边界不是天生的，是每一次说“不”后刻下的痕迹。你曾经允许过世界越界，直到你明白：没有边界的善良，是对自己的残忍。于是你在独立中寻找力量，在孤独中确认自我。你锻造自己的价值观如同锻造刀刃——它既保护你，也切割虚假。\n\n你习惯一个人站在高处，不是因为冷漠，而是因为你需要清晰。你相信：看得清楚，才能走得坚定。你的自信来自成就，因为你用行动证明了自己；你的缺点是待修复的bug，因为你认为人永远可以更好。你不轻易让人靠近，但靠近的人，会看到你灯罩下持续燃烧的火。`, quote: `“你站在悬崖边发光，不是为了照亮深渊，而是为了告诉世界：‘我在这里，以我锻造的棱角。’”`, growth: `灯塔也需要被照亮，偶尔允许别人为你发光。不是所有边界都需要守卫，有些门，可以打开。`, works: `夏洛蒂·勃朗特《简·爱》｜电影《穿普拉达的女王》｜舒婷《致橡树》` },
        '水晶的静默': { desc: `你的独立是与生俱来的清晰，像水晶知道自己如何生长。你不必费力划出边界，因为你本身就是边界——你的存在方式，就是告诉世界：这里是起点，那里是终点。你在关系中保持透明，但不失去结构；你接纳他人的靠近，但从不模糊自己的形状。\n\n你接纳自己的孤独，因为它让你看见自己。你不是不需要他人，而是你相信：真正的联结，是两个完整的人之间的相遇，而不是残缺的相互填补。你的自信仅仅因为你存在，你的缺点是风景的一部分——你从不试图抹去什么，因为你知道，正是这些“不完美”，让你成为你。`, quote: `“你是透明的存在，光穿过你时，会分解成七种颜色。你不解释自己，因为看见的人，自会看见。”`, growth: `有时，允许自己不那么透明，也是一种完整。水晶最动人的时刻，是当光照出它内部的阴影时。`, works: `佩索阿《惶然录》｜电影《天使爱美丽》｜辛波斯卡《一见钟情》` },
        '锻炉的咏叹': { desc: `你的热情不是偶然，是精心守护的火焰。你深知：没有温度的激情只是烟花，而有方向的燃烧才能锻造出形状。你在深刻的碰撞中确认温度，在痛苦中提炼力量——你不回避灼热，因为你知道，真正的成长往往发生在高温之下。\n\n你相信爱需要努力，关系需要经营，自我需要塑造。你不相信“顺其自然”，因为你知道，一切珍贵的事物都需要双手的参与。你选择原谅或不原谅，都是深思熟虑的决定。你活着，不是为了体验，而是为了创造——你想在这个世界上留下点什么，哪怕只是一道痕迹。`, quote: `“你握着锻锤站在炉前，每一次敲打，都在改变世界的形状。你相信火焰可以锻造一切，除了火焰本身。”`, growth: `有时，让火焰只是火焰，不为了锻造什么，也是一种燃烧。炉火需要休息，你也一样。`, works: `毛姆《月亮与六便士》｜电影《黑天鹅》｜北岛《回答》` },
        '野火的漫游': { desc: `你的热烈是自然溢出，像太阳无需证明。你在相遇中燃烧，在离别后重生。你爱，因为爱是你的存在方式；你痛，因为痛让你更鲜活。你不问“值不值得”，你只问“是否真实”。你相信：宁可燃烧成灰烬，也不要熄灭成灰烬。\n\n你的阴暗面不是你压抑的，而是你接纳的另一半火焰。你从不假装自己只有光明，因为你知道，真正的完整，是拥抱所有颜色。你活着，是为了体验一切——浓烈的、稀薄的、明亮的、幽暗的。你不怕失败，只怕从未开始。你是一团没有形状的火，但你照亮过的路，会记得你的温度。`, quote: `“你是荒野上的火，不为了照亮，不为了温暖，只是燃烧。经过你的人，都带着你的温度继续前行。”`, growth: `野火也需要休憩，允许自己有灰烬期，等待下一次复燃。有时，不燃烧也是一种存在方式。`, works: `杰克·凯鲁亚克《在路上》｜电影《燃烧女子的肖像》｜艾米莉·狄金森“我本可以忍受黑暗”` },
        '风筝的远行': { desc: `你的自由不是天生的，是每一次放下的结果。你选择轻盈，因为沉重太累；你选择独立，因为依赖太危险。你锻造自己的通透，像玻璃被高温熔化后重新成型——你经历过破碎，才学会了不依附。你的自信来自不断超越，你的缺点是待转化的能量。\n\n你相信：真正的自由，不是没有牵绊，而是知道自己被什么牵绊，却依然选择飞翔。你总是在路上，在寻找，在抵达下一个远方。你不属于任何一个地方，但每一个你停留过的地方，都因你的经过而变得不同。你害怕被固定，但你也渴望有一根线，让你知道：你不会迷失。`, quote: `“你是一只风筝，飞得高，是因为有人在地上拉着线。你以为的自由，其实是另一种形式的锚定。”`, growth: `偶尔回头看看，是谁在为你拉着线。真正的自由，是知道自己有线，但仍然选择飞翔。`, works: `村上春树《挪威的森林》｜电影《盗梦空间》｜顾城《一代人》` },
        '流云的歌': { desc: `你的自由是你的存在方式，像云生来就会飘浮。你不必费力挣脱什么，因为你从未被真正束缚。你在关系中保持透明，在独立中保持流动。你接纳所有相遇和离别，因为它们都是风景——你不占有，所以你也无法失去。\n\n你的灵魂像水汽，可以凝结成雨，也可以升腾成雾。你没有固定的形状，所以你可以成为任何形状。你相信：意义不在终点，而在路上；你活着，不是为了到达，而是为了经过。你接纳所有可能，也接纳所有不可能。你不是在寻找什么，你只是成为你。`, quote: `“你是天空中的过客，不占有任何风景，却因此拥有了整个天空。你变幻，所以你永恒。”`, growth: `云也需要凝结才能降雨，偶尔让自己落地，滋养一片土地。有时，停下来也是一种流动。`, works: `《庄子》｜电影《云图》｜王维《终南别业》“行到水穷处，坐看云起时”` }
    };

    let currentIndex = 0;
    let answers = new Array(questions.length).fill(null);
    let token = null;
    const loadingDiv = document.getElementById('loading');
    const homeScreen = document.getElementById('home-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const startBtn = document.getElementById('start-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const questionContainer = document.getElementById('question-container');
    const progressBar = document.getElementById('progress-bar');

    async function validateToken() {
        const urlParams = new URLSearchParams(window.location.search);
        const t = urlParams.get('token');
        if (!t) {
            loadingDiv.innerHTML = '<div class="error-msg">❌ 无效的访问链接。请通过正规渠道购买测试。</div>';
            return false;
        }
        token = t;
        try {
            const response = await fetch(`/api/validate?token=${encodeURIComponent(token)}`);
            const data = await response.json();
            if (data.valid) {
                loadingDiv.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                return true;
            } else {
                loadingDiv.innerHTML = '<div class="error-msg">❌ 该链接已失效或不存在。每个链接仅限使用一次。</div>';
                return false;
            }
        } catch (err) {
            console.error(err);
            loadingDiv.innerHTML = '<div class="error-msg">❌ 验证失败，请稍后再试。</div>';
            return false;
        }
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        let html = `<div class="question-text">${q.text}</div><div class="options">`;
        q.options.forEach((opt, idx) => {
            const selectedClass = (answers[currentIndex] === idx) ? 'selected' : '';
            html += `<div class="option ${selectedClass}" data-opt-index="${idx}"><span class="option-prefix">${String.fromCharCode(65+idx)}</span><span>${opt}</span></div>`;
        });
        html += `</div>`;
        questionContainer.innerHTML = html;
        document.querySelectorAll('.option').forEach(optDiv => {
            optDiv.addEventListener('click', function() {
                const idx = parseInt(this.dataset.optIndex);
                answers[currentIndex] = idx;
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
                nextBtn.disabled = false;
            });
        });
        const answeredCount = answers.filter(a => a !== null).length;
        progressBar.style.width = (answeredCount / questions.length * 100) + '%';
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = (answers[currentIndex] === null);
        nextBtn.textContent = (currentIndex === questions.length-1) ? '完成 →' : '下一题 →';
    }

    function prevQuestion() {
        if (currentIndex > 0) { currentIndex--; renderQuestion(); }
    }

    async function nextQuestion() {
        if (currentIndex < questions.length-1) {
            currentIndex++;
            renderQuestion();
        } else {
            if (answers.every(a => a !== null)) {
                let xTotal=0, yTotal=0, zTotal=0;
                for (let i=0; i<questions.length; i++) {
                    const q = questions[i];
                    const ans = answers[i];
                    if (q.scores.X && ans < q.scores.X.length) xTotal += q.scores.X[ans];
                    if (q.scores.Y && ans < q.scores.Y.length) yTotal += q.scores.Y[ans];
                    if (q.scores.Z && ans < q.scores.Z.length) zTotal += q.scores.Z[ans];
                }
                const normX = ((xTotal-8)/16)*10;
                const normY = ((yTotal-8)/16)*10;
                const normZ = ((zTotal-8)/16)*10;
                const x = normX, y = normY, z = normZ;
                let typeName = '';
                if (x <= 5 && y <= 5) typeName = z <= 5 ? '古墙的守望者' : '榕树的低语';
                else if (x <= 5 && y > 5) typeName = z <= 5 ? '灯塔的独白' : '水晶的静默';
                else if (x > 5 && y <= 5) typeName = z <= 5 ? '锻炉的咏叹' : '野火的漫游';
                else typeName = z <= 5 ? '风筝的远行' : '流云的歌';
                await fetch('/api/validate', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ token, markUsed: true }) });
                showResult(typeName);
            } else alert('请回答所有问题');
        }
    }

    function showResult(typeName) {
        const info = results[typeName];
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        resultScreen.innerHTML = `
            <div class="result-type">${typeName}</div>
            <div class="result-image">🌀</div>
            <div class="result-desc">${info.desc}</div>
            <div class="result-quote">${info.quote}</div>
            <div class="epilogue"><strong>🌱 成长提示</strong><br>${info.growth}<br><br><strong>📖 与你共鸣</strong><br>${info.works}</div>
            <div class="epilogue" style="background:transparent; border:none;">
                <strong>终章</strong><br>
                无论你得到的是哪一种灵魂形状，<br>
                那都不是你的牢笼，只是你此刻的一幅自画像。<br>
                你的人生，远比这个测试更辽阔。<br>
                这里没有正确答案，只有属于你的、正在生长的可能性。<br>
                愿你在认识自己的路上，走得更深、更自由。<br>
                你永远可以是下一个版本的自己。<br>
                <em>—— 本测试仅为自我探索的起点，非专业心理评估</em>
            </div>
            <button class="btn btn-primary" id="restart-btn">重新测试</button>
        `;
        document.getElementById('restart-btn').addEventListener('click', () => { resetTest(); });
    }

    function resetTest() {
        answers.fill(null);
        currentIndex = 0;
        homeScreen.classList.remove('hidden');
        quizScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
    }

    startBtn.addEventListener('click', () => { homeScreen.classList.add('hidden'); quizScreen.classList.remove('hidden'); renderQuestion(); });
    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);

    validateToken();
</script>
